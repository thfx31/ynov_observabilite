filebeat.inputs:
  - type: container
    paths:
      - /var/lib/docker/containers/*/*.log
    processors:
      - add_docker_metadata:
          host: "unix:///var/run/docker.sock"
      - drop_event:
          when:
            not:
              or:
                - contains:
                    container.name: "server"
                - contains:
                    container.name: "client"

output.logstash:
  hosts: ["logstash:5044"]