input {
  file {
    path => "/var/log/app/*.log"
    start_position => "beginning"
    sincedb_path => "/dev/null"
  }
  beats {
    port => 5044
  }
}

filter {
  if [message] !~ /^\d{4}-\d{2}-\d{2}/ {
    drop { }
  }

  # Format avec trace_id/span_id (server/client Python)
  grok {
    match => {
      "message" => "%{TIMESTAMP_ISO8601:timestamp} - %{DATA:service} - %{LOGLEVEL:level} - \[trace_id=%{DATA:trace_id} span_id=%{DATA:span_id}\] - %{GREEDYDATA:log_message}"
    }
    tag_on_failure => []
  }

  # Format sans trace_id (logs TP microservices)
  if ![trace_id] {
    grok {
      match => {
        "message" => "%{TIMESTAMP_ISO8601:timestamp} - %{LOGLEVEL:level} - \[%{DATA:service}\] - %{GREEDYDATA:log_message}"
      }
    }
  }

  mutate {
    gsub => ["log_message", "\[[0-9;]*m", ""]
  }

  # Extraire endpoint et latence depuis les logs client
  if [log_message] =~ /Endpoint/ {
    grok {
      match => {
        "log_message" => "%{WORD:http_status_text} \(%{NUMBER:http_code} %{WORD}\) \| Endpoint: %{URIPATH:endpoint} \| Latency: %{NUMBER:latency_seconds:float}s"
      }
      tag_on_failure => []
    }
  }

  date {
    match => ["timestamp", "yyyy-MM-dd HH:mm:ss,SSS"]
    target => "@timestamp"
  }

  mutate {
    remove_field => ["timestamp", "message", "agent", "ecs", "input"]
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "ynov-logs-%{+YYYY.MM.dd}"
  }
}